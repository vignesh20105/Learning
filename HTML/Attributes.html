<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
</head>

<body>
    <a href="../index.html">Back to Index</a>
    <h1 style="text-align: center;">HTML ATTRIBUTES</h1>
    <h1>HREF Attributes</h1>
    <a href="https://github.com/">Github</a><br><hr>
    <h1>SRC ATTRIBUTE</h1>
    <img src="../Images/Nature.jpeg" alt = Nature><hr>
    <h1>WIDTH AND HEIGHT ATTRIBUTE</h1>
    <img src = "../Images/W3 Schools.png" width="500" height = "500"><hr>
    <h1>ALT Attributes</h1>
    <img src="../Images/Nature.jpeg" alt="Nature"><hr>

    <h1>STYLE ATTRIBUTE</h1>
    <h2 style="color: red;">This is a Red Line</h2>
    <h3 style="color: blue;">This is a blue Line</h3><hr>

    <h1>TITLE ATTRIBUTE</h1>
    <p title="I am a Tooltip">I am a Title</p>
</body>
</html>
